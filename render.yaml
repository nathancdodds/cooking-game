services:
  - type: web
    name: recipe-finder
    env: python
    plan: free
    buildCommand: ""
    startCommand: python server.py
    autoDeploy: true
    envVars:
      - key: DATA_DIR
        value: /var/data
    disks:
      - name: recipe-data
        mountPath: /var/data
        sizeGB: 1
