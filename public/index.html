                {"@type":"ListItem","position":1,"item":{"@type":"Recipe","name":"Classic Spaghetti Carbonara","recipeCategory":"Pasta","recipeCuisine":"Italian","recipeIngredient":["spaghetti","eggs","bacon","parmesan","black pepper"],"recipeInstructions":"Cook spaghetti. Fry bacon until crispy. Mix eggs and parmesan. Combine hot pasta with bacon, then remove from heat and add egg mixture, stirring quickly. Season with black pepper."}},
                {"@type":"ListItem","position":2,"item":{"@type":"Recipe","name":"Chicken Stir Fry","recipeCategory":"Main Course","recipeCuisine":"Asian","recipeIngredient":["chicken","soy sauce","vegetables","garlic","rice","salt"],"recipeInstructions":"Cut chicken into bite-sized pieces. Heat oil in wok, add garlic, then chicken. Add vegetables and soy sauce. Stir fry until cooked. Serve over rice."}},

                {"@type":"ListItem","position":4,"item":{"@type":"Recipe","name":"Caesar Salad","recipeCategory":"Salad","recipeCuisine":"American","recipeIngredient":["romaine lettuce","parmesan","croutons","caesar dressing","lemon"],"recipeInstructions":"Chop romaine lettuce. Toss with caesar dressing. Top with parmesan shavings and croutons. Squeeze fresh lemon on top."}},
                {"@type":"ListItem","position":5,"item":{"@type":"Recipe","name":"Beef Tacos","recipeCategory":"Mexican","recipeCuisine":"Mexican","recipeIngredient":["ground beef","taco shells","cheese","lettuce","tomato","sour cream"],"recipeInstructions":"Brown ground beef with taco seasoning. Fill taco shells with beef. Top with shredded cheese, lettuce, diced tomato, and sour cream."}},
                {"@type":"ListItem","position":6,"item":{"@type":"Recipe","name":"Caprese Salad","recipeCategory":"Salad","recipeCuisine":"Italian","recipeIngredient":["tomato","mozzarella","basil","olive oil","balsamic vinegar","salt"],"recipeInstructions":"Slice tomatoes and mozzarella. Arrange alternating slices with basil leaves. Drizzle with olive oil and balsamic vinegar. Season with salt and pepper."}},
                {"@type":"ListItem","position":7,"item":{"@type":"Recipe","name":"Scrambled Eggs","recipeCategory":"Breakfast","recipeCuisine":"American","recipeIngredient":["eggs","butter","milk","salt"],"recipeInstructions":"Beat eggs with milk and salt. Melt butter in pan. Pour in eggs and gently stir over medium-low heat until just set."}},
                {"@type":"ListItem","position":8,"item":{"@type":"Recipe","name":"Grilled Cheese Sandwich","recipeCategory":"Sandwich","recipeCuisine":"American","recipeIngredient":["bread","cheese","butter"],"recipeInstructions":"Butter outside of bread slices. Place cheese between slices. Grill in pan over medium heat until golden brown on both sides and cheese melts."}},
                {"@type":"ListItem","position":9,"item":{"@type":"Recipe","name":"Tomato Soup","recipeCategory":"Soup","recipeCuisine":"American","recipeIngredient":["tomato","onion","garlic","vegetable broth","cream","salt"],"recipeInstructions":"Sauté onion and garlic. Add chopped tomatoes and broth. Simmer 20 minutes. Blend until smooth. Stir in cream and season to taste."}},
                {"@type":"ListItem","position":10,"item":{"@type":"Recipe","name":"Chicken Quesadilla","recipeCategory":"Mexican","recipeCuisine":"Mexican","recipeIngredient":["chicken","tortillas","cheese","bell pepper","onion"],"recipeInstructions":"Cook and shred chicken. Sauté peppers and onions. Fill tortilla with chicken, vegetables, and cheese. Fold and cook in pan until golden and cheese melts."}},
                {"@type":"ListItem","position":11,"item":{"@type":"Recipe","name":"Fried Rice","recipeCategory":"Side Dish","recipeCuisine":"Asian","recipeIngredient":["rice","eggs","soy sauce","vegetables","oil"],"recipeInstructions":"Use day-old rice. Scramble eggs and set aside. Fry vegetables, add rice, soy sauce, and eggs. Stir fry until heated through."}},
                {"@type":"ListItem","position":12,"item":{"@type":"Recipe","name":"Pasta Primavera","recipeCategory":"Pasta","recipeCuisine":"Italian","recipeIngredient":["pasta","vegetables","olive oil","garlic","parmesan","salt"],"recipeInstructions":"Cook pasta. Sauté garlic in olive oil, add vegetables. Toss with pasta and top with parmesan cheese."}},
                {"@type":"ListItem","position":13,"item":{"@type":"Recipe","name":"BLT Sandwich","recipeCategory":"Sandwich","recipeCuisine":"American","recipeIngredient":["bacon","lettuce","tomato","bread","mayonnaise"],"recipeInstructions":"Cook bacon until crispy. Toast bread. Spread mayo on bread, layer with bacon, lettuce, and tomato slices."}},
                {"@type":"ListItem","position":14,"item":{"@type":"Recipe","name":"Omelette","recipeCategory":"Breakfast","recipeCuisine":"French","recipeIngredient":["eggs","cheese","butter","milk","salt"],"recipeInstructions":"Beat eggs with milk. Melt butter in pan. Pour in eggs, let set slightly. Add cheese, fold omelette in half. Cook until done."}},
                {"@type":"ListItem","position":15,"item":{"@type":"Recipe","name":"Chicken Alfredo","recipeCategory":"Pasta","recipeCuisine":"Italian","recipeIngredient":["chicken","fettuccine","cream","parmesan","garlic","butter","salt"],"recipeInstructions":"Cook pasta. Season and cook chicken. Make alfredo sauce with butter, garlic, cream, and parmesan. Combine pasta, chicken, and sauce."}},
                {"@type":"ListItem","position":16,"item":{"@type":"Recipe","name":"Pancakes","recipeCategory":"Breakfast","recipeCuisine":"American","recipeIngredient":["flour","eggs","milk","butter","sugar"],"recipeInstructions":"Mix flour, eggs, milk, melted butter, and sugar. Pour batter onto hot griddle. Flip when bubbles form. Cook until golden brown."}},
                {"@type":"ListItem","position":17,"item":{"@type":"Recipe","name":"Greek Salad","recipeCategory":"Salad","recipeCuisine":"Greek","recipeIngredient":["cucumber","tomato","feta cheese","olives","olive oil","lemon","salt"],"recipeInstructions":"Chop cucumber and tomato. Add olives and crumbled feta. Dress with olive oil and lemon juice. Season with oregano."}},
                {"@type":"ListItem","position":18,"item":{"@type":"Recipe","name":"Chicken Noodle Soup","recipeCategory":"Soup","recipeCuisine":"American","recipeIngredient":["chicken","noodles","carrots","celery","chicken broth","onion","salt"],"recipeInstructions":"Boil chicken in broth with vegetables. Remove chicken, shred it, and return to pot. Add noodles and simmer until cooked."}},
                {"@type":"ListItem","position":19,"item":{"@type":"Recipe","name":"Mashed Potatoes","recipeCategory":"Side Dish","recipeCuisine":"American","recipeIngredient":["potatoes","butter","milk","salt","black pepper"],"recipeInstructions":"Boil peeled potatoes until fork-tender. Drain and mash with butter and warm milk. Season with salt and black pepper."}},
                {"@type":"ListItem","position":20,"item":{"@type":"Recipe","name":"Baked Salmon","recipeCategory":"Seafood","recipeCuisine":"American","recipeIngredient":["salmon","olive oil","lemon","garlic","salt"],"recipeInstructions":"Season salmon with olive oil, lemon juice, garlic, and salt. Bake at 400°F until flaky, about 12 to 15 minutes."}},

                {"@type":"ListItem","position":22,"item":{"@type":"Recipe","name":"Mac and Cheese","recipeCategory":"Pasta","recipeCuisine":"American","recipeIngredient":["macaroni","cheese","milk","butter","salt"],"recipeInstructions":"Cook macaroni. Melt butter, stir in milk and cheese until smooth, season with salt, then combine with pasta."}},
                {"@type":"ListItem","position":23,"item":{"@type":"Recipe","name":"Chili","recipeCategory":"Soup","recipeCuisine":"American","recipeIngredient":["ground beef","beans","tomato","onion","garlic","salt","chili powder"],"recipeInstructions":"Brown beef with onion and garlic. Add tomatoes, beans, salt, and chili powder. Simmer until thick and flavorful."}},
                {"@type":"ListItem","position":24,"item":{"@type":"Recipe","name":"Chicken Curry","recipeCategory":"Main Course","recipeCuisine":"Indian","recipeIngredient":["chicken","onion","garlic","curry powder","coconut milk","salt","rice"],"recipeInstructions":"Cook onion and garlic, add chicken and curry powder, then stir in coconut milk and salt. Simmer and serve over rice."}},
                {"@type":"ListItem","position":25,"item":{"@type":"Recipe","name":"Avocado Toast","recipeCategory":"Breakfast","recipeCuisine":"American","recipeIngredient":["bread","avocado","lemon","salt","olive oil"],"recipeInstructions":"Toast bread. Mash avocado with lemon and salt, spread on toast, and drizzle lightly with olive oil."}},
                {"@type":"ListItem","position":26,"item":{"@type":"Recipe","name":"Garlic Butter Shrimp","recipeCategory":"Seafood","recipeCuisine":"American","recipeIngredient":["shrimp","butter","garlic","lemon","salt"],"recipeInstructions":"Cook garlic in butter, add shrimp and salt, then finish with lemon juice once shrimp turn pink."}},
                {"@type":"ListItem","position":27,"item":{"@type":"Recipe","name":"Honey Garlic Butter Salmon","recipeCategory":"Seafood","recipeCuisine":"American","recipeIngredient":["salmon","butter","honey","garlic","soy sauce","lemon"],"recipeInstructions":"Mix butter, honey, garlic, and soy sauce. Sear salmon in oven-safe pan 3 minutes per side. Pour sauce over salmon and bake at 400°F for 5–6 minutes. Finish with a squeeze of lemon."}},
                {"@type":"ListItem","position":28,"item":{"@type":"Recipe","name":"Sheet Pan Lemon Herb Chicken","recipeCategory":"Main Course","recipeCuisine":"American","recipeIngredient":["chicken","lemon","garlic","olive oil","rosemary","vegetables","salt","black pepper"],"recipeInstructions":"Toss chicken and vegetables with olive oil, lemon juice, garlic, rosemary, salt, and pepper. Spread on sheet pan. Roast at 425°F for 25–30 minutes until cooked through."}}
            ]
        }
        </script>
</head>
<body>
    <div class="container">
        <div class="recipe-search-bar">
            <input type="text" id="recipeSearch" placeholder="🔍 Search recipes..." />
        </div>

        <header>
            <h1>🍳 Recipe Finder</h1>
            <p class="subtitle">Enter your ingredients and discover what you can make!</p>
            <button id="addRecipeBtn" class="add-recipe-btn">+ Add Your Recipe</button>
        </header>

        <div id="recipeModal" class="modal">
            <div class="modal-content">
                <span id="closeModal" class="close">&times;</span>
                <h2>Add Your Own Recipe</h2>
                <form id="recipeForm">
                    <div class="form-group">
                        <label for="recipeName">Recipe Name:</label>
                        <input type="text" id="recipeName" required placeholder="e.g., homemade pasta" />
                    </div>
                    <div class="form-group">
                        <label for="recipeIngredients">Ingredients (comma-separated):</label>
                        <textarea id="recipeIngredients" required placeholder="e.g., 2 cups flour, 3 eggs, 1 tsp salt, 1 cup water" rows="4"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="recipeInstructions">Instructions:</label>
                        <textarea id="recipeInstructions" required placeholder="Step-by-step instructions..." rows="5"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="recipeSource">Recipe Source (optional):</label>
                        <input type="text" id="recipeSource" placeholder="e.g., allrecipes.com or Jamie Oliver's website" />
                    </div>
                    <div class="form-group">
                        <label for="recipeSourceUrl">Source URL (optional):</label>
                        <input type="url" id="recipeSourceUrl" placeholder="e.g., https://www.allrecipes.com/recipe/..." />
                    </div>
                    <button type="submit" class="submit-btn">Save Recipe</button>
                </form>
            </div>
        </div>

        <div class="ingredient-input-section">
            <div class="input-group">
                <input type="text" id="ingredientInput" placeholder="Type an ingredient (e.g., chicken, tomato)..." />
                <button id="addIngredient">Add</button>
            </div>
            
            <div class="selected-ingredients">
                <h3>Your Ingredients:</h3>
                <div id="ingredientTags" class="ingredient-tags"></div>
                <button id="clearAll" class="clear-btn">Clear All</button>
            </div>
        </div>

        <div class="results-section">
            <h2>Recipes You Can Make (<span id="recipeCount">0</span>)</h2>
            <div id="recipeResults" class="recipe-grid"></div>
        </div>
    </div>

    <script src="recipes.js"></script>
    <script src="app.js"></script>
</body>
</html>
